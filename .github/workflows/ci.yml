name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  web:
    name: Web — lint · types · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Lint (web)
        run: npm run lint --workspace web
      - name: Typecheck (@bpmap/shared)
        run: npm run typecheck:shared
      - name: Build (web)
        run: npm run build --workspace web

  mobile:
    name: App mobile — types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Générer expo-env.d.ts
        working-directory: appMobile
        run: printf '/// <reference types="expo/types" />\n' > expo-env.d.ts
      - name: Typecheck (appMobile)
        working-directory: appMobile
        run: npx tsc --noEmit

  deploy:
    name: Déploiement Vercel (production)
    needs: [web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Installer Vercel CLI
        run: npm i -g vercel@latest
      - name: Récupérer la config du projet Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Déployer en production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

name: Mise à jour quotidienne des festivals

on:
  schedule:
    - cron: "0 5 * * *" # tous les jours à 05:00 UTC
  workflow_dispatch: {} # déclenchement manuel possible

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Ingestion (Wikidata + OpenAgenda + RA + DATAtourisme) → candidats
        run: node web/scripts/ingest.mjs
        env:
          DATATOURISME_FLUX_URL: ${{ secrets.DATATOURISME_FLUX_URL }}

      - name: Vérification automatique + promotion (croisement de sources)
        run: node web/scripts/verify-promote.mjs

      - name: Enrichissement des line-ups via Resident Advisor
        run: node web/scripts/ra-lineups.mjs

      - name: Prix & line-ups Shotgun (navigateur headless, fail-open)
        run: node web/scripts/shotgun-update.mjs

      - name: Géocodage (régénère shared/src/data/festivals.json via la BAN)
        run: npm run geocode --workspace web

      - name: Journal des changements (diff vs version committée → changes.json)
        run: npx tsx web/scripts/diff-changes.mjs

      - name: Migrations Neon (idempotentes)
        run: node web/scripts/db-migrate.mjs
        env:
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}

      - name: Charger dans Neon
        run: node web/scripts/db-load.mjs
        env:
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}

      - name: Cycle de vie (marque "passé" + purge à +1 mois)
        run: node web/scripts/db-lifecycle.mjs
        env:
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}

      - name: Notifications push (changements du jour → Expo Push)
        run: node web/scripts/send-push.mjs
        env:
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}

      - name: Ouvrir une PR de rafraîchissement (auto-merge après CI)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "bpmap-bot"
          git config user.email "bpmap-bot@users.noreply.github.com"
          git add shared/src/data/festivals.json shared/src/data/festivals.source.json shared/src/data/lineups.json shared/src/data/prices.json shared/src/data/festivals.candidates.json shared/src/data/changes.json
          if git diff --staged --quiet; then echo "Aucun changement de données."; exit 0; fi
          BRANCH="data/refresh-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git commit -m "chore: rafraîchissement quotidien des données (ingestion + vérif auto)"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore: données quotidiennes" \
            --body "Rafraîchissement automatique (ingestion + vérification croisée des sources)."
          gh pr merge "$BRANCH" --auto --merge --delete-branch

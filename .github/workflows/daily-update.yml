name: Mise à jour quotidienne des festivals

on:
  schedule:
    - cron: "0 5 * * *" # tous les jours à 05:00 UTC
  workflow_dispatch: {} # déclenchement manuel possible

permissions:
  contents: write # pour committer festivals.json rafraîchi

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Ingestion (Wikidata + OpenAgenda + RA + DATAtourisme) → candidats
        run: node web/scripts/ingest.mjs
        env:
          DATATOURISME_FLUX_URL: ${{ secrets.DATATOURISME_FLUX_URL }}

      - name: Vérification automatique + promotion (croisement de sources)
        run: node web/scripts/verify-promote.mjs

      - name: Enrichissement des line-ups via Resident Advisor
        run: node web/scripts/ra-lineups.mjs

      - name: Géocodage (régénère shared/src/data/festivals.json via la BAN)
        run: npm run geocode --workspace web

      - name: Charger dans Neon
        run: node web/scripts/db-load.mjs
        env:
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}

      - name: Cycle de vie (marque "passé" + purge à +1 mois)
        run: node web/scripts/db-lifecycle.mjs
        env:
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}

      - name: Committer les données rafraîchies
        run: |
          git config user.name "bpmap-bot"
          git config user.email "bpmap-bot@users.noreply.github.com"
          git add shared/src/data/festivals.json shared/src/data/festivals.source.json shared/src/data/lineups.json shared/src/data/festivals.candidates.json
          git diff --staged --quiet || git commit -m "chore: rafraîchissement quotidien des données (ingestion + vérif auto)"
          git push
